<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#080B12">
  <title>Expense Tracker — Arkana App</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/expense-tracker.css">

  <!-- JS load order: config → constants → utils → app → page -->
  <script src="config.js?v=1.8.0"></script>
  <script src="js/constants.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
<div id="app">

  <!-- ══════════════════════════════════════
       SCREEN: MAIN
  ══════════════════════════════════════ -->
  <div id="screen-main" class="screen active">

    <!-- Topbar -->
    <div class="topbar">
      <button class="back-btn" id="btn-back">←</button>
      <div class="topbar-body">
        <div class="topbar-title">Expense Tracker</div>
        <div class="topbar-sub" id="topbar-sub">Memuat...</div>
      </div>
    </div>

    <!-- Tab bar -->
    <div class="tab-bar">
      <div class="tab active" id="tab-pengeluaran">Pengeluaran</div>
      <div class="tab"        id="tab-ringkasan">Ringkasan</div>
    </div>

    <!-- Filter bars — shared across both tabs -->
    <div class="filters-wrap">
      <div class="filter-scroll" id="filter-bulan-wrap">
        <button class="filter-chip active" data-bulan="">Semua</button>
      </div>
      <div class="filter-scroll" id="filter-tipe-wrap">
        <button class="filter-chip active" data-tipe="">Semua Tipe</button>
        <button class="filter-chip" data-tipe="umum">Umum</button>
        <button class="filter-chip" data-tipe="proyek">Proyek</button>
      </div>
      <div class="filter-scroll" id="filter-metode-wrap">
        <button class="filter-chip active" data-metode="">Semua Metode</button>
        <button class="filter-chip" data-metode="kas_perusahaan">Kas Perusahaan</button>
        <button class="filter-chip" data-metode="personal">Personal</button>
        <button class="filter-chip" data-metode="vendor_paylater">Vendor Paylater</button>
      </div>
    </div>

    <!-- ── PANE: PENGELUARAN ── -->
    <div id="pane-pengeluaran" class="scroll-content">
      <!-- Expense list -->
      <div class="card-list" id="list-expenses"></div>
    </div>

    <!-- ── PANE: RINGKASAN ── -->
    <div id="pane-ringkasan" class="scroll-content" style="display:none">
      <div id="ringkasan-content"></div>
    </div>

    <!-- FAB -->
    <button class="fab" id="btn-fab">+</button>

  </div>

</div><!-- /#app -->

<!-- ══════════════════════════════════════
     OVERLAY: ADD / EDIT EXPENSE
══════════════════════════════════════ -->
<div class="overlay" id="overlay-expense">
  <div class="sheet" id="sheet-expense">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-expense-title">Pengeluaran Baru</div>
    <div class="sheet-sub">Data tersimpan ke Google Sheet</div>

    <!-- 1. Tanggal -->
    <div class="form-group">
      <label class="form-label">Tanggal</label>
      <input class="form-input" id="f-tanggal" type="date">
    </div>

    <!-- 2. Tipe -->
    <div class="form-group">
      <label class="form-label">Tipe Pengeluaran</label>
      <select class="form-select" id="f-tipe">
        <option value="umum">Umum</option>
        <option value="proyek">Proyek</option>
      </select>
    </div>

    <!-- 3. Proyek (conditional) -->
    <div class="form-group" id="group-proyek" style="display:none">
      <label class="form-label">Proyek</label>
      <select class="form-select" id="f-proyek">
        <option value="">Pilih proyek...</option>
      </select>
    </div>

    <!-- 4. Kategori -->
    <div class="form-group">
      <label class="form-label">Kategori</label>
      <select class="form-select" id="f-kategori">
        <option value="">Pilih kategori...</option>
      </select>
    </div>

    <!-- 4b. Custom kategori (conditional) -->
    <div class="form-group" id="group-custom-kategori" style="display:none">
      <label class="form-label">Kategori Lainnya</label>
      <input class="form-input" id="f-custom-kategori" type="text" placeholder="Tulis kategori...">
    </div>

    <!-- 5. Deskripsi -->
    <div class="form-group">
      <label class="form-label">Deskripsi</label>
      <input class="form-input" id="f-deskripsi" type="text" placeholder="Keterangan singkat pengeluaran">
    </div>

    <!-- 6. Vendor -->
    <div class="form-group">
      <label class="form-label">Vendor <span class="form-optional">(opsional)</span></label>
      <input class="form-input" id="f-vendor" type="text" placeholder="Nama toko / vendor">
    </div>

    <!-- 7. Jumlah -->
    <div class="form-group">
      <label class="form-label">Jumlah (Rp)</label>
      <input class="form-input rp-input" id="f-jumlah" type="text" inputmode="numeric" placeholder="0">
    </div>

    <!-- 8. Metode Pembayaran -->
    <div class="form-group">
      <label class="form-label">Metode Pembayaran</label>
      <select class="form-select" id="f-metode">
        <option value="kas_perusahaan">Kas Perusahaan</option>
        <option value="personal">Personal</option>
        <option value="vendor_paylater">Vendor Paylater</option>
      </select>
    </div>

    <!-- 9. Perlu Reimburse? (conditional: personal) -->
    <div class="form-group" id="group-reimburse" style="display:none">
      <div class="toggle-row">
        <span class="toggle-label">Perlu Reimburse?</span>
        <label class="toggle">
          <input type="checkbox" id="f-reimburse">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>

    <!-- 10. Dibayar Oleh (conditional: personal) -->
    <div class="form-group" id="group-dibayar" style="display:none">
      <label class="form-label">Dibayar Oleh</label>
      <input class="form-input" id="f-dibayar" type="text" placeholder="Nama yang bayar duluan">
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" id="btn-expense-cancel">Batal</button>
      <button class="btn btn-primary"   id="btn-expense-save">Simpan</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     OVERLAY: EXPENSE DETAIL
══════════════════════════════════════ -->
<div class="overlay" id="overlay-detail">
  <div class="sheet" id="sheet-detail">
    <div class="sheet-handle"></div>
    <div class="detail-desc"   id="detail-desc"></div>
    <div class="detail-amount" id="detail-amount"></div>
    <div class="detail-badges" id="detail-badges"></div>
    <div class="detail-rows"   id="detail-rows"></div>
    <div class="btn-row" style="margin-top:20px;">
      <button class="btn btn-secondary" id="btn-detail-edit">✏️ Edit</button>
      <button class="btn btn-danger"    id="btn-detail-delete">Hapus</button>
    </div>
  </div>
</div>

<!-- ══ CONFIRM ══ -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title">Hapus Pengeluaran?</div>
    <div class="confirm-msg"   id="confirm-msg">Data akan dihapus permanen.</div>
    <div class="confirm-btns">
      <button class="btn btn-secondary" id="confirm-cancel">Batal</button>
      <button class="btn btn-danger"    id="confirm-ok">Hapus</button>
    </div>
  </div>
</div>

<!-- ══ LOADING ══ -->
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Memuat...</div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<script src="js/expense-tracker.js"></script>
</body>
</html>
