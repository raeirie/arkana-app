<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#080B12">
  <title>Project Manager — Arkana App</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/project-manager.css">

  <!-- JS load order: config → constants → utils → app → page -->
  <script src="config.js?v=1.8.0"></script>
  <script src="js/constants.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
</head>
<body>

<div id="app">

  <!-- ══════════════════════════════════════
       SCREEN: MAIN
  ══════════════════════════════════════ -->
  <div id="screen-main" class="screen active">

    <!-- Header -->
    <div class="pm-header">
      <button class="back-btn" id="btn-back">‹</button>
      <div class="pm-header-text">
        <div class="pm-title">Project Manager</div>
        <div class="pm-sub" id="pm-sub">Memuat...</div>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <button class="filter-chip active" data-filter="all">Semua</button>
      <button class="filter-chip" data-filter="active">Aktif</button>
      <button class="filter-chip" data-filter="closed">Selesai</button>
    </div>

    <!-- Project list -->
    <div class="pm-list" id="pm-list">
      <div class="empty-state">
        <div class="empty-icon">📁</div>
        <div class="empty-text">Belum ada proyek.<br>Tap + untuk menambahkan proyek baru.</div>
      </div>
    </div>

    <!-- FAB -->
    <button class="fab" id="btn-fab">+</button>

  </div>

</div><!-- /#app -->

<!-- ══════════════════════════════════════
     OVERLAY + SHEET: ADD / EDIT PROJECT
══════════════════════════════════════ -->
<div class="overlay" id="overlay-project">
  <div class="sheet" id="sheet-project">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-project-title">Proyek Baru</div>
    <div class="sheet-sub">Isi detail proyek di bawah ini</div>

    <div class="form-group">
      <label class="form-label">Nama Proyek</label>
      <input class="form-input" id="input-nama" type="text" placeholder="Contoh: RSUD Bekasi — CCTV">
    </div>

    <div class="form-group">
      <label class="form-label">Unit Bisnis</label>
      <select class="form-select" id="input-unit"></select>
    </div>

    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-select" id="input-status">
        <option value="active">Aktif</option>
        <option value="closed">Selesai</option>
      </select>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" id="btn-sheet-cancel">Batal</button>
      <button class="btn btn-primary" id="btn-sheet-save">Simpan</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     OVERLAY + SHEET: PROJECT DETAIL
══════════════════════════════════════ -->
<div class="overlay" id="overlay-detail">
  <div class="sheet" id="sheet-detail">
    <div class="sheet-handle"></div>
    <div class="detail-name" id="detail-name"></div>
    <div class="detail-meta" id="detail-meta"></div>

    <div class="detail-stats" id="detail-stats"></div>

    <div class="detail-actions">
      <div class="btn-row">
        <button class="btn btn-secondary" id="btn-detail-edit">✏️ Edit</button>
        <button class="btn btn-secondary" id="btn-detail-toggle">⏸ Tutup Proyek</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-danger" id="btn-detail-delete">Hapus Proyek</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ CONFIRM ══ -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title">Hapus Proyek?</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="btn btn-secondary" id="confirm-cancel">Batal</button>
      <button class="btn btn-danger" id="confirm-ok">Hapus</button>
    </div>
  </div>
</div>

<!-- ══ LOADING ══ -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Memuat...</div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<script src="js/project-manager.js"></script>
</body>
</html>
